<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEXUS OS | COMMAND CENTER</title>
    <style>
        :root { --bg: #0a0a0b; --panel: #121214; --accent: #00f2ff; --text: #d1d1d1; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* SIDEBAR */
        #sidebar { 
            width: 300px; background: var(--panel); border-right: 1px solid #222; 
            display: flex; flex-direction: column; padding: 25px; flex-shrink: 0;
        }
        .brand { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 30px; letter-spacing: 1px; }
        .section-label { font-size: 10px; text-transform: uppercase; color: #555; letter-spacing: 2px; margin-bottom: 15px; }
        
        #agent-list { flex: 1; overflow-y: auto; }
        .agent-card { 
            background: #1a1a1c; border: 1px solid #282828; padding: 15px; border-radius: 10px; 
            margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .agent-card:hover { border-color: var(--accent); background: #1d1d20; }
        .agent-card input { accent-color: var(--accent); transform: scale(1.2); }

        /* MAIN CONTENT */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #scroll-content { 
            flex: 1; overflow-y: auto; padding: 40px; 
            padding-bottom: 120px; /* Space for terminal */
        }

        textarea { 
            background: #151517; border: 1px solid #333; color: white; width: 100%; 
            padding: 20px; border-radius: 12px; font-family: inherit; font-size: 15px;
            resize: none; box-sizing: border-box; margin-bottom: 20px; outline: none;
        }
        textarea:focus { border-color: var(--accent); }

        .btn { 
            background: var(--accent); color: #000; border: none; padding: 14px 28px; 
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(0,242,255,0.3); }

        /* LOG BOXES */
        .log-box { 
            background: #111113; border: 1px solid #222; border-left: 4px solid var(--accent);
            padding: 20px; margin-top: 25px; border-radius: 4px 12px 12px 4px;
            animation: fadeIn 0.4s ease;
        }
        .log-box strong { color: var(--accent); font-size: 13px; display: block; margin-bottom: 10px; }
        .log-box pre { white-space: pre-wrap; margin: 0; font-size: 14px; color: #bbb; line-height: 1.6; }

        /* TERMINAL BAR */
        #terminal-bar { 
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #000; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 30px; gap: 15px;
        }
        #term-input { background: transparent; border: none; color: #00ff00; flex: 1; outline: none; font-family: 'Courier New', monospace; font-size: 16px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="brand">NEXUS_FORGE //</div>
    <div class="section-label">Fleet Status</div>
    <div id="agent-list"></div>
    <button class="btn" onclick="spawnAgent()" style="margin-top: 20px; width: 100%;">DEPLOY NEW UNIT</button>
</div>

<div id="main">
    <div id="scroll-content">
        <div class="section-label">Direct Mission Control</div>
        <textarea id="mission-input" rows="4" placeholder="Enter objective..."></textarea>
        <button class="btn" onclick="executeSequence()">INITIATE PROTOCOL</button>

        <div id="feed"></div>
    </div>

    <div id="terminal-bar">
        <span style="color: #00ff00; font-weight: bold;">UNIT_ROOT > </span>
        <input type="text" id="term-input" placeholder="Enter shell command for selected unit..." onkeydown="if(event.key==='Enter') runShell()">
    </div>
</div>

<script>
    const API = "http://127.0.0.1:8000";
    let selectedIds = [];

    async function updateFleet() {
        const res = await fetch(`${API}/forge/agents`);
        const agents = await res.json();
        const list = document.getElementById('agent-list');
        list.innerHTML = '';
        Object.entries(agents).forEach(([id, data]) => {
            const card = document.createElement('div');
            card.className = 'agent-card';
            card.innerHTML = `
                <input type="checkbox" onchange="toggleAgent('${id}')" ${selectedIds.includes(id)?'checked':''}>
                <div>
                    <div style="font-weight:700;">${data.config.name}</div>
                    <div style="font-size:11px; color:#666;">${data.config.role}</div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function toggleAgent(id) {
        if(selectedIds.includes(id)) selectedIds = selectedIds.filter(x => x !== id);
        else selectedIds.push(id);
    }

    async function spawnAgent() {
        const n = prompt("Unit Name:");
        const r = prompt("Unit Specialization (Role):");
        if(n && r) {
            await fetch(`${API}/forge/spawn`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: n, role: r})
            });
            updateFleet();
        }
    }

    async function executeSequence() {
        if(selectedIds.length === 0) return alert("No units selected for the mission.");
        const feed = document.getElementById('feed');
        const prompt = document.getElementById('mission-input').value;
        
        feed.innerHTML += `<div style="color:var(--accent); font-size:12px; margin: 20px 0;">[SYSTEM] SEQUENCE STARTING WITH ${selectedIds.length} UNITS...</div>`;

        try {
            const res = await fetch(`${API}/forge/execute_sequential`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({agent_ids: selectedIds, prompt: prompt})
            });
            const data = await res.json();
            
            data.mission_results.forEach(res => {
                const box = document.createElement('div');
                box.className = 'log-box';
                box.innerHTML = `<strong>${res.agent.toUpperCase()}</strong><pre>${res.output}</pre>`;
                feed.appendChild(box);
            });
        } catch (err) {
            feed.innerHTML += `<div style="color:red;">[FATAL] ${err.message}</div>`;
        }
        
        const scroll = document.getElementById('scroll-content');
        scroll.scrollTop = scroll.scrollHeight;
    }

    async function runShell() {
        const cmd = document.getElementById('term-input').value;
        if(selectedIds.length === 0) return alert("Select a unit first!");
        
        const res = await fetch(`${API}/forge/terminal?agent_id=${selectedIds[0]}&command=${encodeURIComponent(cmd)}`, {method:'POST'});
        const data = await res.json();
        alert("TERMINAL RESPONSE:\n" + data.output);
        document.getElementById('term-input').value = '';
    }

    updateFleet();
    setInterval(updateFleet, 10000); // Sync fleet every 10s
</script>

</body>
</html>
